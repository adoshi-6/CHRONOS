<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Assistant Console</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #0E0F13; font-family: 'Inter', sans-serif; color: #ffffff; }

        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: auto; }

        /* Glassmorphism UI panels */
        .glass-panel {
            background: rgba(14, 15, 19, 0.15);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            z-index: 2;
            position: absolute;
            transition: all 300ms cubic-bezier(0.16, 1, 0.3, 1);
        }

        header {
            position: absolute; top: 0; left: 0; width: 100%; height: 56px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; z-index: 2;
        }
        .wordmark { font-weight: 600; font-size: 16px; letter-spacing: 0.05em; display: flex; align-items: center; }
        .wordmark span { color: #2DD4A8; margin-left: 2px; font-size: 20px; }
        .header-right { display: flex; align-items: center; gap: 20px; }
        .ghost-btn { background: none; border: none; color: rgba(255,255,255,0.6); font-size: 14px; cursor: pointer; transition: color 0.2s; }
        .ghost-btn:hover { color: #2DD4A8; }

        .status-container { display: flex; align-items: center; gap: 8px; font-size: 11px; font-family: monospace; letter-spacing: 0.05em; color: rgba(255,255,255,0.5); }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background-color: #8A8D91; transition: background-color 0.3s; }
        .status-dot.listening { background-color: #2DD4A8; box-shadow: 0 0 10px #2DD4A8; animation: pulseGlow 1.4s infinite; }
        .status-dot.processing { background-color: #3b82f6; box-shadow: 0 0 10px #3b82f6; animation: pulseGlow 1.4s infinite; }

        /* Right activity panel */
        #activity-panel {
            top: 70px; right: 10px; width: 260px; height: calc(100% - 210px);
            border-radius: 8px; padding: 15px; display: flex; flex-direction: column; gap: 20px;
        }
        #activity-panel.collapsed { width: 36px; padding: 15px 5px; overflow: hidden; }
        .panel-toggle { position: absolute; top: 10px; left: 10px; cursor: pointer; color: #2DD4A8; font-size: 12px; font-weight: bold; }
        .panel-content { display: flex; flex-direction: column; gap: 20px; width: 230px; margin-top: 20px; }
        .section-header { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.4); letter-spacing: 0.08em; display: flex; justify-content: space-between; }
        .panel-entry { font-size: 12px; color: rgba(255,255,255,0.8); background: rgba(255,255,255,0.03); padding: 8px; border-radius: 4px; border-left: 2px solid #2DD4A8; animation: slideIn 300ms cubic-bezier(0.16, 1, 0.3, 1); }

        /* Response card stack */
        #response-stack { position: absolute; top: 120px; left: 30px; z-index: 2; display: flex; flex-direction: column; gap: 15px; pointer-events: none; }
        .response-card {
            width: 280px; background: rgba(22, 23, 29, 0.75); border-radius: 6px;
            border-top: 2px solid #2DD4A8; padding: 15px; font-size: 13px; line-height: 1.5;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); pointer-events: auto;
            animation: floatAnim 4s ease-in-out infinite, entryRotate 400ms cubic-bezier(0.16, 1, 0.3, 1);
        }
        .response-card .speaker-tag { font-size: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; color: #2DD4A8; }

        /* Bottom control dock */
        #control-dock {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 130px;
            z-index: 2; display: flex; flex-direction: column; align-items: center;
            justify-content: center; pointer-events: none; gap: 10px;
        }
        .interactive-elements { display: flex; align-items: center; gap: 20px; pointer-events: auto; }

        .chat-input-wrapper {
            background: rgba(14, 15, 19, 0.4); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 20px;
            padding: 5px 15px; display: flex; align-items: center; width: 320px;
        }
        .chat-input-wrapper input { background: none; border: none; outline: none; color: #ffffff; font-family: 'Inter', sans-serif; font-size: 13px; width: 100%; }
        .chat-input-wrapper input::placeholder { color: rgba(255,255,255,0.3); }

        .mic-container { position: relative; width: 64px; height: 64px; }
        .mic-button {
            width: 64px; height: 64px; border-radius: 50%; background: #16171D;
            border: 1px solid rgba(255, 255, 255, 0.08); display: flex; align-items: center;
            justify-content: center; cursor: pointer; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .mic-button svg { width: 22px; height: 22px; fill: #ffffff; transition: fill 0.3s; }
        .mic-button.active { border-color: #2DD4A8; box-shadow: 0 0 24px rgba(45, 212, 168, 0.5); }
        .mic-button.active svg { fill: #2DD4A8; }
        .pulse-ring {
            position: absolute; top: 0; left: 0; width: 64px; height: 64px;
            border-radius: 50%; border: 2px solid #2DD4A8; pointer-events: none;
            opacity: 0;
        }
        .mic-button.active + .pulse-ring { animation: ringSpread 1.4s infinite cubic-bezier(0.16, 1, 0.3, 1); }

        .hint-text { font-size: 11px; font-family: monospace; text-transform: uppercase; color: rgba(255,255,255,0.4); letter-spacing: 0.08em; }

        @keyframes ringSpread { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.3); opacity: 0; } }
        @keyframes floatAnim { 0%, 100% { transform: translateY(0px) rotateX(8deg); } 50% { transform: translateY(-6px) rotateX(8deg); } }
        @keyframes entryRotate { 0% { opacity: 0; transform: scale(0.9) translateY(10px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
        @keyframes slideIn { 0% { opacity: 0; transform: translateX(20px); } 100% { opacity: 1; transform: translateX(0); } }
        @keyframes pulseGlow { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <header class="glass-panel">
        <div class="wordmark">ASSISTANT<span>.</span></div>
        <div class="header-right">
            <button class="ghost-btn">MAP</button>
            <button class="ghost-btn">ALERTS</button>
            <div class="status-container">
                <span id="system-status-text">IDLE</span>
                <div id="global-status-dot" class="status-dot"></div>
            </div>
        </div>
    </header>

    <div id="response-stack">
        <div class="response-card" id="welcome-card">
            <div class="speaker-tag">System</div>
            Console online. Standing by for input.
        </div>
    </div>

    <div id="activity-panel" class="glass-panel">
        <div class="panel-toggle" onclick="togglePanel()">+</div>
        <div class="panel-content" id="panel-content-area">
            <div>
                <div class="section-header">SESSION <span>0</span></div>
            </div>
            <div>
                <div class="section-header">STATUS <span>READY</span></div>
                <div class="panel-entry">Neural path verified.</div>
            </div>
        </div>
    </div>

    <div id="control-dock">
        <div class="interactive-elements">
            <div class="chat-input-wrapper">
                <input type="text" id="chat-entry" placeholder="Type a command..." onkeypress="handleTextSubmit(event)">
            </div>
            <div class="mic-container">
                <div class="mic-button" id="master-mic-btn" onclick="toggleVoiceCapture()">
                    <svg id="mic-icon-svg" viewBox="0 0 24 24">
                        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/>
                    </svg>
                </div>
                <div class="pulse-ring"></div>
            </div>
        </div>
        <div class="hint-text">TAP MIC OR PRESS ENTER TO SEND</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, starParticles, orbMesh, orbGlow;
        let voiceBrightTarget = 0.0, currentVoiceBright = 0.0;
        let isListening = false;

        // Three.js animated background — starfield and breathing orb
        function initSpaceScene() {
            const container = document.getElementById('canvas-container');
            scene    = new THREE.Scene();
            camera   = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // Starfield
            const starGeometry  = new THREE.BufferGeometry();
            const starCount     = 1200;
            const starPositions = new Float32Array(starCount * 3);
            for (let i = 0; i < starCount * 3; i++) starPositions[i] = (Math.random() - 0.5) * 15;
            starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
            starParticles = new THREE.Points(starGeometry, new THREE.PointsMaterial({ color: 0xffffff, size: 0.02, transparent: true, opacity: 0.8 }));
            scene.add(starParticles);

            // Central orb
            orbMesh = new THREE.Mesh(new THREE.SphereGeometry(0.6, 64, 64), new THREE.MeshBasicMaterial({ color: 0x2DD4A8 }));
            scene.add(orbMesh);
            orbGlow = new THREE.Mesh(new THREE.SphereGeometry(0.8, 32, 32), new THREE.MeshBasicMaterial({ color: 0x2DD4A8, transparent: true, opacity: 0.25, side: THREE.BackSide }));
            scene.add(orbGlow);

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
            animateLoop();
        }

        function animateLoop() {
            requestAnimationFrame(animateLoop);
            const time = Date.now() * 0.001;
            currentVoiceBright += (voiceBrightTarget - currentVoiceBright) * 0.1;
            const s = 1.0 + Math.sin(time * 1.5) * 0.04 + currentVoiceBright * 0.3;
            orbMesh.scale.set(s, s, s);
            orbGlow.scale.set(s * 1.2, s * 1.2, s * 1.2);
            starParticles.rotation.y = time * 0.02;
            renderer.render(scene, camera);
        }

        // Backend communication
        function postCommandToBackend(text) {
            updateSystemUIState("processing");
            appendResponseCard("You", text);
            fetch('/api/command', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ command: text })
            })
            .then(res => res.json())
            .then(data => {
                updateSystemUIState("idle");
                if (typeof data.response === 'object') {
                    if (data.response.contrarian)  appendResponseCard("Contrarian",  data.response.contrarian);
                    if (data.response.synergist)   appendResponseCard("Synergist",   data.response.synergist);
                    if (data.response.chairman)    appendResponseCard("Chairman",    data.response.chairman);
                } else {
                    appendResponseCard("Assistant", data.response);
                }
                voiceBrightTarget = 1.0;
                setTimeout(() => { voiceBrightTarget = 0.0; }, 800);
            })
            .catch(() => {
                updateSystemUIState("idle");
                appendResponseCard("Error", "Could not connect to the server.");
            });
        }

        function handleTextSubmit(event) {
            if (event.key === 'Enter') {
                const input = document.getElementById('chat-entry');
                const text  = input.value.trim();
                if (!text) return;
                input.value = "";
                postCommandToBackend(text);
            }
        }

        function toggleVoiceCapture() {
            if (!isListening) {
                isListening = true;
                document.getElementById('master-mic-btn').classList.add('active');
                document.getElementById('mic-icon-svg').innerHTML = '<rect x="6" y="6" width="12" height="12"/>';
                updateSystemUIState("listening");
                startBrowserVoiceCapture();
            } else {
                stopVoice();
            }
        }

        function stopVoice() {
            isListening = false;
            document.getElementById('master-mic-btn').classList.remove('active');
            document.getElementById('mic-icon-svg').innerHTML = '<path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/>';
        }

        function startBrowserVoiceCapture() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                appendResponseCard("Error", "Speech recognition not supported in this browser.");
                stopVoice();
                updateSystemUIState("idle");
                return;
            }
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.interimResults = false;
            recognition.onresult = (event) => { postCommandToBackend(event.results[0][0].transcript); };
            recognition.onerror  = () => { stopVoice(); updateSystemUIState("idle"); };
            recognition.onend    = () => { stopVoice(); };
            recognition.start();
        }

        function updateSystemUIState(state) {
            const text = document.getElementById('system-status-text');
            const dot  = document.getElementById('global-status-dot');
            dot.className = "status-dot";
            if      (state === "listening")   { text.innerText = "LISTENING";  dot.classList.add('listening'); }
            else if (state === "processing")  { text.innerText = "PROCESSING"; dot.classList.add('processing'); }
            else                              { text.innerText = "ONLINE"; }
        }

        function appendResponseCard(speaker, message) {
            const stack = document.getElementById('response-stack');
            const card  = document.createElement('div');
            card.className = 'response-card';
            card.innerHTML = `<div class="speaker-tag">${speaker}</div><div>${message}</div>`;
            if (stack.children.length >= 3) stack.removeChild(stack.children[0]);
            stack.appendChild(card);
        }

        function togglePanel() {
            document.getElementById('activity-panel').classList.toggle('collapsed');
        }

        window.onload = initSpaceScene;
    </script>
</body>
</html>
